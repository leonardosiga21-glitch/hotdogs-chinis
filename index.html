<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HotDogs & Hamburguesas Chinis</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #000000, #1c1c1c);
    color:white;
}
header{
    text-align:center;
    padding:40px 20px;
}
.logo{
    width:200px;
    border-radius:15px;
}
h1{
    color:#d4af37;
}
.container{
    background:#111;
    width:95%;
    max-width:1100px;
    margin:30px auto;
    padding:30px;
    border-radius:20px;
}
.menu{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}
.card{
    background:#1e1e1e;
    width:260px;
    padding:20px;
    border-radius:15px;
    text-align:center;
    transition:0.4s;
    border:1px solid #d4af37;
}
.card:hover{
    transform:translateY(-8px) scale(1.03);
}
.price{
    font-size:20px;
    font-weight:bold;
    color:#d4af37;
}
button{
    background:#d4af37;
    color:black;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
    font-weight:600;
}
button:hover{
    background:#b8962e;
}
.carrito{
    margin-top:40px;
    background:#1e1e1e;
    padding:20px;
    border-radius:15px;
}
select, input{
    padding:10px;
    margin-top:10px;
    width:100%;
    border-radius:8px;
    border:none;
}
.total{
    font-size:22px;
    font-weight:bold;
    margin-top:15px;
    color:#d4af37;
}
textarea{
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    border:none;
}
</style>
</head>

<body>

<header>
<img src="logo-CHINIS.jpg" class="logo">
<h1>HOTDOGS & HAMBURGUESAS CHINIS</h1>
<p>Sabor Premium 🔥</p>
</header>

<div class="container">

<h2>Menú</h2>

<div class="menu">

<div class="card">
<h3>Hot Dog Clásico</h3>
<p class="price">$35</p>
<button onclick="agregar(35,'Hot Dog Clásico')">Agregar</button>
</div>

<div class="card">
<h3>Hamburguesa Especial</h3>
<p class="price">$65</p>
<button onclick="agregar(65,'Hamburguesa Especial')">Agregar</button>
</div>

<div class="card">
<h3>Chinis Combo</h3>
<p class="price">$95</p>
<button onclick="agregar(95,'Chinis Combo')">Agregar</button>
</div>

</div>

<div class="carrito">
<h2>🛒 Tu Pedido</h2>

<form id="formPedido">

<input type="text" id="nombre" placeholder="Tu nombre" required>

<ul id="lista"></ul>

<input type="text" id="codigoPromo" placeholder="Código Promocional">

<p class="total">Total: $<span id="total">0</span></p>

<label>Tipo de Pedido:</label>
<select id="tipoPedido">
<option value="Recoger">Para recoger</option>
<option value="Domicilio">A domicilio</option>
</select>

<input type="text" id="direccion" placeholder="Dirección (si es domicilio)">

<button type="submit">Enviar Pedido</button>

</form>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCj_IMuiq68im6n1jug57qf7ketoM3xb4w",
  authDomain: "chinis-pedidos.firebaseapp.com",
  projectId: "chinis-pedidos",
  storageBucket: "chinis-pedidos.firebasestorage.app",
  messagingSenderId: "926867987996",
  appId: "1:926867987996:web:58fd428f1a2a120d0bc9d9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let total = 0;
let descuento = 0;
let productos = [];

window.agregar = function(precio, nombre){
    total += precio;
    productos.push(nombre + " - $" + precio);

    let li = document.createElement("li");
    li.textContent = nombre + " - $" + precio;
    document.getElementById("lista").appendChild(li);

    actualizarTotal();
}

function actualizarTotal(){
    document.getElementById("total").innerText = total - descuento;
}

document.getElementById("codigoPromo").addEventListener("change", function(){
    if(this.value === "CHINIS10"){
        descuento = total * 0.10;
        alert("Código aplicado 10% ✅");
    } else {
        descuento = 0;
    }
    actualizarTotal();
});

document.getElementById("formPedido").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const nombre = document.getElementById("nombre").value;
    const tipo = document.getElementById("tipoPedido").value;
    const direccion = document.getElementById("direccion").value;
    const totalFinal = total - descuento;

    if(productos.length === 0){
        alert("Agrega al menos un producto");
        return;
    }

    try{
        await addDoc(collection(db, "pedidos"), {
            nombre: nombre,
            productos: productos,
            total: totalFinal,
            tipo: tipo,
            direccion: direccion,
            fecha: serverTimestamp(),
            estado: "Pendiente"
        });

        alert("Pedido enviado correctamente ✅");

        total = 0;
        descuento = 0;
        productos = [];
        document.getElementById("lista").innerHTML = "";
        actualizarTotal();
        document.getElementById("formPedido").reset();

    }catch(error){
        alert("Error al enviar pedido ❌");
        console.error(error);
    }
});
</script>

</body>
</html>
