<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HotDogs & Hamburguesas Chinis</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #000000, #1c1c1c);
    color:white;
}

header{
    text-align:center;
    padding:40px 20px;
}

.logo{
    width:200px;
    border-radius:15px;
}

h1{
    color:#d4af37;
}

.container{
    background:#111;
    width:95%;
    max-width:1100px;
    margin:30px auto;
    padding:30px;
    border-radius:20px;
}

.menu{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    background:#1e1e1e;
    width:260px;
    padding:20px;
    border-radius:15px;
    text-align:center;
    transition:0.4s;
    border:1px solid #d4af37;
}

.card:hover{
    transform:translateY(-8px) scale(1.03);
}

.price{
    font-size:20px;
    font-weight:bold;
    color:#d4af37;
}

button{
    background:#d4af37;
    color:black;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
    font-weight:600;
}

button:hover{
    background:#b8962e;
}

.carrito{
    margin-top:40px;
    background:#1e1e1e;
    padding:20px;
    border-radius:15px;
}

select, input{
    padding:10px;
    margin-top:10px;
    width:100%;
    border-radius:8px;
    border:none;
}

.total{
    font-size:22px;
    font-weight:bold;
    margin-top:15px;
    color:#d4af37;
}

.cerrado{
    background:#8b0000;
    padding:15px;
    text-align:center;
    font-weight:bold;
    border-radius:10px;
    margin-bottom:20px;
}

.admin{
    margin-top:30px;
    background:#222;
    padding:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
<img src="logo-CHINIS.jpg" class="logo">
<h1>HOTDOGS & HAMBURGUESAS CHINIS</h1>
<p>Sabor Premium 🔥</p>
</header>

<div class="container">

<div id="estado"></div>

<h2>Menú</h2>

<div class="menu">

<div class="card">
<h3>Hot Dog Clásico</h3>
<p class="price">$35</p>
<button onclick="agregar(35,'Hot Dog Clásico')">Agregar</button>
</div>

<div class="card">
<h3>Hamburguesa Especial</h3>
<p class="price">$65</p>
<button onclick="agregar(65,'Hamburguesa Especial')">Agregar</button>
</div>

<div class="card">
<h3>Chinis Combo</h3>
<p class="price">$95</p>
<button onclick="agregar(95,'Chinis Combo')">Agregar</button>
</div>

</div>

<div class="carrito">
<h2>🛒 Tu Pedido</h2>

<ul id="lista"></ul>

<input type="text" id="codigoPromo" placeholder="Código Promocional">

<p class="total">Total: $<span id="total">0</span></p>

<label>Forma de Pago:</label>
<select id="pago">
<option value="">Seleccionar</option>
<option value="Efectivo">Efectivo</option>
<option value="Tarjeta">Tarjeta</option>
</select>

<label>Tipo de Pedido:</label>
<select id="tipoPedido" onchange="verDireccion()">
<option value="">Seleccionar</option>
<option value="Recoger">Para recoger</option>
<option value="Domicilio">A domicilio</option>
</select>

<div id="direccionBox" style="display:none;">
<label>Dirección:</label>
<input type="text" id="direccion" placeholder="Escribe tu dirección completa">
</div>

<br>
<button onclick="finalizar()">Finalizar Pedido</button>

</div>

<div class="admin">
<h3>Panel Administrativo</h3>
<p>Promoción activa: <b>CHINIS10 - 10%</b></p>
<p>Pedidos guardados: <span id="historial"></span></p>
</div>

</div>

<script>

let total = 0;
let descuento = 0;

function verificarHorario(){
    let ahora = new Date();
    let dia = ahora.getDay();
    let hora = ahora.getHours();

    if((dia === 4 || dia === 5 || dia === 6) && hora >= 19 && hora < 23){
        document.getElementById("estado").innerHTML = "<div style='color:lightgreen;font-weight:bold;'>🟢 Estamos Abiertos</div>";
        return true;
    } else {
        document.getElementById("estado").innerHTML = "<div class='cerrado'>🔴 Estamos Cerrados<br>Horario: Jueves a Sábado 19:00–23:00</div>";
        return false;
    }
}

function agregar(precio, nombre){
    if(!verificarHorario()) return;

    total += precio;
    actualizarTotal();

    let li = document.createElement("li");
    li.textContent = nombre + " - $" + precio;
    document.getElementById("lista").appendChild(li);
}

function actualizarTotal(){
    let totalFinal = total - descuento;
    document.getElementById("total").innerText = totalFinal;
}

function verDireccion(){
    let tipo = document.getElementById("tipoPedido").value;
    document.getElementById("direccionBox").style.display =
        tipo === "Domicilio" ? "block" : "none";
}

function aplicarPromo(){
    let codigo = document.getElementById("codigoPromo").value;

    if(codigo === "CHINIS10"){
        descuento = total * 0.10;
        alert("Código aplicado ✅ 10% de descuento");
    } else {
        descuento = 0;
    }

    actualizarTotal();
}

document.getElementById("codigoPromo").addEventListener("change", aplicarPromo);

function finalizar(){
    if(!verificarHorario()) return;

    let pago = document.getElementById("pago").value;
    let tipo = document.getElementById("tipoPedido").value;
    let direccion = document.getElementById("direccion").value;

    if(total === 0 || pago === "" || tipo === ""){
        alert("Completa todos los campos");
        return;
    }

    if(tipo === "Domicilio" && direccion === ""){
        alert("Ingresa tu dirección");
        return;
    }

    let totalFinal = total - descuento;

    let productos = document.getElementById("lista").innerText;

    let mensaje = "🛒 NUEVO PEDIDO CHINIS %0A%0A" +
                  productos + "%0A%0A" +
                  "Total: $" + totalFinal + "%0A" +
                  "Pago: " + pago + "%0A" +
                  "Tipo: " + tipo + "%0A";

    if(tipo === "Domicilio"){
        mensaje += "Dirección: " + direccion + "%0A";
    }

    let telefono = "523339065846";
    window.open("https://wa.me/" + telefono + "?text=" + mensaje, "_blank");

    let pedidos = localStorage.getItem("pedidos") || 0;
    pedidos++;
    localStorage.setItem("pedidos", pedidos);
    document.getElementById("historial").innerText = pedidos;

    alert("Pedido enviado correctamente ✅");
}

verificarHorario();
document.getElementById("historial").innerText = localStorage.getItem("pedidos") || 0;

</script>

</body>
</html>
