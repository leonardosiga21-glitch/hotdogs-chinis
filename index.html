<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CHINIS Pedidos</title>
</head>
<body>

<h1>CHINIS - Realiza tu pedido</h1>

<h3>Selecciona tus productos</h3>

<label>
  <input type="checkbox" name="producto" value="Hamburguesa">
  Hamburguesa
</label><br>

<label>
  <input type="checkbox" name="producto" value="Hot Dog">
  Hot Dog
</label><br>

<label>
  <input type="checkbox" name="producto" value="Papas">
  Papas
</label><br><br>


<h3>Tipo de entrega</h3>

<label>
  <input type="radio" name="entrega" value="Recoger en tienda" onclick="mostrarDireccion(false)">
  Recoger en tienda
</label><br>

<label>
  <input type="radio" name="entrega" value="Envío a domicilio" onclick="mostrarDireccion(true)">
  Envío a domicilio
</label>

<br><br>

<div id="direccionContainer" style="display:none;">
  <input type="text" id="direccion" placeholder="Dirección (obligatoria)">
  <br><br>
  <input type="text" id="referencias" placeholder="Referencias (opcional) Ej: Casa azul con portón negro">
</div>

<br><br>

<button onclick="enviarPedido()">Enviar Pedido</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCj_IMuiq68im6n1jug57qf7ketoM3xb4w",
  authDomain: "chinis-pedidos.firebaseapp.com",
  projectId: "chinis-pedidos",
  storageBucket: "chinis-pedidos.firebasestorage.app",
  messagingSenderId: "926867987996",
  appId: "1:926867987996:web:58fd428f1a2a120d0bc9d9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.mostrarDireccion = function(mostrar) {
  const contenedor = document.getElementById("direccionContainer");
  contenedor.style.display = mostrar ? "block" : "none";
}

window.enviarPedido = async function() {

  const productosSeleccionados = document.querySelectorAll('input[name="producto"]:checked');

  if (productosSeleccionados.length === 0) {
    alert("Selecciona al menos un producto");
    return;
  }

  const productos = [];
  productosSeleccionados.forEach(p => productos.push(p.value));

  const tipoEntrega = document.querySelector('input[name="entrega"]:checked');
  if (!tipoEntrega) {
    alert("Selecciona tipo de entrega");
    return;
  }

  let direccion = "";
  let referencias = "";

  if (tipoEntrega.value === "Envío a domicilio") {
    direccion = document.getElementById("direccion").value.trim();
    referencias = document.getElementById("referencias").value.trim();

    if (direccion === "") {
      alert("La dirección es obligatoria para envío a domicilio");
      return;
    }
  }

  try {

    await addDoc(collection(db, "pedidos"), {
      productos: productos,
      tipoEntrega: tipoEntrega.value,
      direccion: direccion,
      referencias: referencias,
      estado: "Pendiente",
      fecha: new Date()
    });

    alert("Pedido enviado correctamente");

    location.reload();

  } catch (error) {
    alert("Error al enviar el pedido");
    console.error(error);
  }

}

</script>

</body>
</html>
